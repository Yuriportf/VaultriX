version: '3.8'

services:
  db:
    image: postgres:15
    container_name: vaultx_db
    environment:
      POSTGRES_DB: vaultx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  backend:
    build: .
    container_name: vaultx_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db